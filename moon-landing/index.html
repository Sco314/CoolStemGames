<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Moon Landing — Cool STEM Games</title>
    <meta name="description" content="MoonLanding.site — Artemis II mission tracker, hosted via Cool STEM Games." />
    <meta name="theme-color" content="#060a1c" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      :root {
        --bar-h: 48px;
        --ink: #f0f0f5;
        --bg: #060a1c;
      }
      * { box-sizing: border-box; margin: 0; }
      html, body {
        height: 100%;
        background: var(--bg);
        color: var(--ink);
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, sans-serif;
      }
      .topbar {
        position: fixed;
        inset: 0 0 auto 0;
        height: var(--bar-h);
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 0 14px;
        background: rgba(6, 10, 28, 0.92);
        backdrop-filter: blur(6px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        z-index: 10;
      }
      .back {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 14px;
        border-radius: 999px;
        background: #1ea7fd;
        color: #fff;
        font-weight: 600;
        font-size: 14px;
        text-decoration: none;
        transition: transform 0.08s ease, box-shadow 0.08s ease, background 0.15s;
      }
      .back:hover { transform: scale(1.04); background: #58b8f8; }
      .back:active { transform: scale(0.98); }
      .title {
        font-size: 14px;
        opacity: 0.85;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .title b { color: #58b8f8; font-weight: 700; }
      .spacer { flex: 1; }
      .open-new {
        font-size: 12px;
        color: #ccd;
        text-decoration: none;
        padding: 6px 10px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.18);
      }
      .open-new:hover { background: rgba(255, 255, 255, 0.06); }

      .frame-wrap {
        position: fixed;
        inset: var(--bar-h) 0 0 0;
      }
      iframe {
        width: 100%;
        height: 100%;
        border: 0;
        background: #000;
      }
      .fallback {
        display: none;
        position: absolute;
        inset: 0;
        place-content: center;
        text-align: center;
        padding: 40px 20px;
      }
      .fallback.visible { display: grid; }
      .fallback p { max-width: 520px; line-height: 1.5; opacity: 0.85; margin-bottom: 18px; }
      .fallback a.cta {
        display: inline-block;
        padding: 12px 22px;
        background: #1ea7fd;
        color: #fff;
        border-radius: 10px;
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <a class="back" href="/" aria-label="Back to Cool STEM Games">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
        Cool STEM Games
      </a>
      <div class="title"><b>MoonLanding.Site</b> — Artemis II Mission Tracker</div>
      <div class="spacer"></div>
      <a class="open-new" href="https://moonlanding.site" target="_blank" rel="noopener">Open in new tab ↗</a>
    </header>

    <div class="frame-wrap">
      <iframe
        id="ml-frame"
        src="https://moonlanding.site"
        title="MoonLanding.site"
        allow="accelerometer; autoplay; clipboard-read; clipboard-write; fullscreen; gyroscope"
        referrerpolicy="no-referrer-when-downgrade"
      ></iframe>
      <div class="fallback" id="fallback">
        <div>
          <p>
            MoonLanding.site can't be embedded inside another page (it sets a
            frame-blocking header). Click below to open it directly — you can use
            your browser's back button to return.
          </p>
          <a class="cta" href="https://moonlanding.site" target="_blank" rel="noopener">Open MoonLanding.site →</a>
        </div>
      </div>
    </div>

    <script>
      // If the iframe never finishes loading (because of X-Frame-Options /
      // CSP frame-ancestors), reveal the fallback so the user isn't stuck.
      (function () {
        var frame = document.getElementById("ml-frame");
        var fallback = document.getElementById("fallback");
        var loaded = false;
        frame.addEventListener("load", function () { loaded = true; });
        setTimeout(function () {
          if (!loaded) fallback.classList.add("visible");
        }, 4000);
      })();
    </script>
  </body>
</html>
