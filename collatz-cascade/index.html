<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
    <title>Collatz Cascade | Cool STEM Games</title>
    <meta name="description" content="Explore the Collatz conjecture as a living 3D graph. Type numbers and watch every path fall home to 1." />
    <meta name="theme-color" content="#0a0f1e" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="style.css" />
    <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
      }
    }
    </script>
  </head>
  <body>
    <!-- TOP: always visible -->
    <header id="top-bar">
      <a href="/" class="back-link">&larr; CoolStemGames</a>
      <span class="app-title">Collatz Cascade</span>
      <button id="btn-recenter" class="icon-btn" title="Recenter camera">&#8634;</button>
    </header>

    <nav id="mode-selector">
      <button class="mode-btn active" data-mode="timeseries">Time Series</button>
      <button class="mode-btn" data-mode="flatchart">Flat Chart</button>
      <button class="mode-btn" data-mode="spiral">Spiral</button>
      <button class="mode-btn" data-mode="numberline">Num Line</button>
      <button class="mode-btn" data-mode="particles">Particles</button>
      <button class="mode-btn" data-mode="value">Value</button>
      <button class="mode-btn" data-mode="parity">Parity</button>
      <button class="mode-btn" data-mode="stopping">Stopping</button>
    </nav>

    <div id="stopping-subs" class="sub-modes hidden">
      <button class="sub-btn active" data-mode="stopping">Scatter</button>
      <button class="sub-btn" data-mode="stopping-value">By Value</button>
      <button class="sub-btn" data-mode="stopping-parity">By Parity</button>
      <button class="sub-btn" data-mode="stopping-tree">By Tree</button>
    </div>

    <!-- MIDDLE: the 3D canvas and any overlays that float above it -->
    <main id="scene-wrap">
      <canvas id="scene"></canvas>

      <!-- Math display (number line mode) -->
      <div id="math-bar" class="hidden">
        <span id="math-label"></span>
        <span id="math-rule"></span>
        <span id="math-operation"></span>
        <span id="math-result"></span>
      </div>

      <!-- Number line controls -->
      <div id="nl-controls" class="hidden">
        <button id="nl-scale" class="nl-btn">Linear</button>
        <button id="nl-extents" class="nl-btn">Extents</button>
        <button id="nl-goto" class="nl-btn">Go To #</button>
        <button id="nl-low" class="nl-btn">Find Low</button>
        <button id="nl-high" class="nl-btn">Find High</button>
        <button id="nl-ff" class="nl-btn nl-ff">1x</button>
        <input id="nl-goto-input" class="hidden" type="text" inputmode="numeric" placeholder="#" autocomplete="off" />
      </div>

      <!-- Chart controls (time series + spiral) -->
      <div id="chart-controls" class="hidden">
        <button id="chart-clear" class="nl-btn">Clear</button>
        <button id="chart-flip" class="nl-btn ts-only">Flip X/Y</button>
      </div>

      <div id="tooltip" class="hidden"></div>
      <div id="legend" class="hidden">
        <div class="legend-bar"></div>
        <div class="legend-labels">
          <span>shallow</span>
          <span>deep</span>
        </div>
      </div>

      <aside id="recent-panel">
        <h3>Recent</h3>
        <ul id="recent-list"></ul>
      </aside>

      <div id="step-info" class="hidden">
        <span id="step-value"></span>
        <span id="step-detail"></span>
      </div>
    </main>

    <!-- BOTTOM: always visible -->
    <footer id="bottom-bar">
      <div id="ts-slider-wrap" class="hidden">
        <label for="ts-slider">Fill to: <span id="ts-slider-val">0</span></label>
        <input id="ts-slider" type="range" min="0" max="200" value="0" step="1" />
      </div>

      <div id="graph-slider-wrap" class="hidden">
        <label for="graph-slider">Visible: <span id="graph-slider-val">100</span></label>
        <input id="graph-slider" type="range" min="1" max="200" value="100" step="1" />
      </div>

      <div id="spiral-slider-wrap" class="hidden">
        <label for="spiral-slider">Visible: <span id="spiral-slider-val">50</span></label>
        <input id="spiral-slider" type="range" min="1" max="100" value="50" step="1" />
      </div>

      <div id="nl-slider-wrap" class="hidden">
        <label for="nl-slider">Orbs: <span id="nl-slider-val">250</span></label>
        <input id="nl-slider" type="range" min="1" max="500" value="250" step="1" />
      </div>

      <div id="flat-slider-wrap" class="hidden">
        <label for="flat-slider">Fill to: <span id="flat-slider-val">0</span></label>
        <input id="flat-slider" type="range" min="0" max="500" value="0" step="1" />
      </div>

      <div id="input-area">
        <input id="num-input" type="text" inputmode="text" placeholder="Try 27 or 27^27" autocomplete="off" />
        <button id="btn-go">Add</button>
        <span class="input-sep"></span>
        <input id="fill-input" type="text" inputmode="numeric" placeholder="Fill 1–N" autocomplete="off" />
        <button id="btn-fill">Fill</button>
        <button id="btn-abort" class="hidden">Abort</button>
      </div>
    </footer>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
