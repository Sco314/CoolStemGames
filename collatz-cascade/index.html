<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Collatz Cascade | Cool STEM Games</title>
    <meta name="description" content="Explore the Collatz conjecture as a living 3D graph. Type numbers and watch every path fall home to 1." />
    <meta name="theme-color" content="#0a0f1e" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="style.css" />
    <script async src="https://cdn.jsdelivr.net/npm/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
      }
    }
    </script>
  </head>
  <body>
    <canvas id="scene"></canvas>

    <div id="ui-root">
      <header id="top-bar">
        <a href="/" class="back-link">&larr; CoolStemGames</a>
        <span class="app-title">Collatz Cascade</span>
        <button id="btn-recenter" class="icon-btn" title="Recenter camera">&#8634;</button>
      </header>

      <nav id="mode-selector">
        <button class="mode-btn active" data-mode="particles" title="Force-directed layout">Particles</button>
        <button class="mode-btn" data-mode="value" title="Y = log₂(value)">Value</button>
        <button class="mode-btn" data-mode="parity" title="Even left, odd right">Parity</button>
        <button class="mode-btn" data-mode="stopping" title="Rings by stopping time">Stopping Time</button>
        <div id="stopping-subs" class="sub-modes hidden">
          <button class="sub-btn active" data-mode="stopping" title="Golden angle scatter">Scatter</button>
          <button class="sub-btn" data-mode="stopping-value" title="Angle = log₂(value)">By Value</button>
          <button class="sub-btn" data-mode="stopping-parity" title="Even left, odd right semicircles">By Parity</button>
          <button class="sub-btn" data-mode="stopping-tree" title="Angle inherited from tree parent">By Tree</button>
        </div>
        <button class="mode-btn" data-mode="numberline" title="Animated number line">Number Line</button>
      </nav>

      <!-- Math display bar (bottom, persistent until next collision) -->
      <div id="math-bar" class="hidden">
        <span id="math-label"></span>
        <span id="math-rule"></span>
        <span id="math-operation"></span>
        <span id="math-result"></span>
      </div>

      <!-- Number line controls (bottom-left) -->
      <div id="nl-controls" class="hidden">
        <button id="nl-extents" class="nl-btn" title="Zoom to see full number line">Extents</button>
        <button id="nl-goto" class="nl-btn" title="Zoom to a specific number">Go To #</button>
        <button id="nl-low" class="nl-btn" title="Find lowest un-Collatzed number">Find Low</button>
        <button id="nl-high" class="nl-btn" title="Find highest un-Collatzed number">Find High</button>
        <button id="nl-ff" class="nl-btn nl-ff" title="Speed up animation">1x</button>
        <input id="nl-goto-input" class="hidden" type="text" inputmode="numeric" placeholder="#" autocomplete="off" />
      </div>

      <div id="input-area">
        <input id="num-input" type="text" inputmode="numeric" placeholder="Try 27" autocomplete="off" />
        <button id="btn-go">Add</button>
        <span class="input-sep"></span>
        <input id="fill-input" type="text" inputmode="numeric" placeholder="Fill 1–N" autocomplete="off" />
        <button id="btn-fill">Fill</button>
      </div>

      <div id="step-info" class="hidden">
        <span id="step-value"></span>
        <span id="step-detail"></span>
      </div>

      <aside id="recent-panel">
        <h3>Recent</h3>
        <ul id="recent-list"></ul>
      </aside>

      <div id="tooltip" class="hidden"></div>

      <div id="legend" class="hidden">
        <div class="legend-bar"></div>
        <div class="legend-labels">
          <span>shallow</span>
          <span>deep</span>
        </div>
      </div>
    </div>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
