<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 285 107" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="space" cx="55%" cy="38%" r="78%">
      <stop offset="0" stop-color="#1a2750"/>
      <stop offset="1" stop-color="#04060f"/>
    </radialGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5b5b66"/>
      <stop offset="1" stop-color="#141420"/>
    </linearGradient>
  </defs>

  <rect width="285" height="107" fill="url(#space)"/>

  <!-- Stars -->
  <g fill="#ffffff">
    <circle cx="12" cy="14" r="0.8"/>
    <circle cx="38" cy="8"  r="0.6"/>
    <circle cx="66" cy="22" r="1.0"/>
    <circle cx="102" cy="6" r="0.7"/>
    <circle cx="132" cy="16" r="0.9"/>
    <circle cx="168" cy="11" r="0.6"/>
    <circle cx="202" cy="24" r="1.0"/>
    <circle cx="234" cy="10" r="0.7"/>
    <circle cx="262" cy="20" r="0.8"/>
    <circle cx="276" cy="34" r="0.6"/>
    <circle cx="8"  cy="42" r="0.6"/>
    <circle cx="52" cy="48" r="0.5"/>
    <circle cx="250" cy="48" r="0.6"/>
  </g>

  <!-- Earth-rise disc on the right to sell the "Moon" read -->
  <circle cx="248" cy="38" r="12" fill="#1b4a8a" opacity="0.55"/>
  <circle cx="245" cy="35" r="12" fill="#3072c6" opacity="0.35"/>

  <!-- Moon-surface horizon with a flat landing pad in the middle -->
  <path d="M0 95
           L22 82 L38 86 L64 72 L82 78
           L110 70 L148 70
           L178 62 L208 68 L236 58 L266 70 L285 76
           L285 107 L0 107 Z" fill="url(#ground)"/>

  <!-- Bonus-pad label above the flat stretch -->
  <text x="128" y="64" fill="#ffee66" font-family="Courier New, monospace"
        font-size="9" font-weight="bold" letter-spacing="1">X5</text>

  <!-- Lander, hovering and burning on descent -->
  <g transform="translate(90, 38)">
    <!-- Ascent stage -->
    <rect x="-9"  y="-14" width="18" height="12" fill="#eaeaee"/>
    <rect x="-9"  y="-14" width="18" height="2"  fill="#8a8a92"/>
    <rect x="-4"  y="-10" width="8"  height="5"  fill="#ffcb44"/>
    <!-- Antenna -->
    <line x1="0" y1="-14" x2="0" y2="-19" stroke="#3d3d45" stroke-width="1"/>
    <!-- Descent stage -->
    <rect x="-13" y="-2"  width="26" height="10" fill="#eaeaee"/>
    <rect x="-13" y="-2"  width="26" height="2"  fill="#3d3d45"/>
    <rect x="-10" y="2"   width="6"  height="4"  fill="#9a9aa0"/>
    <rect x="4"   y="2"   width="6"  height="4"  fill="#9a9aa0"/>
    <!-- Nozzle -->
    <rect x="-2"  y="8"   width="4"  height="3"  fill="#626268"/>
    <!-- Legs -->
    <line x1="-13" y1="5" x2="-22" y2="18" stroke="#3d3d45" stroke-width="1.6"/>
    <line x1="13"  y1="5" x2="22"  y2="18" stroke="#3d3d45" stroke-width="1.6"/>
    <line x1="-7"  y1="8" x2="-12" y2="20" stroke="#3d3d45" stroke-width="1.6"/>
    <line x1="7"   y1="8" x2="12"  y2="20" stroke="#3d3d45" stroke-width="1.6"/>
    <!-- Foot pads -->
    <rect x="-24" y="17" width="5" height="2" fill="#8a8a92"/>
    <rect x="19"  y="17" width="5" height="2" fill="#8a8a92"/>
    <rect x="-14" y="19" width="5" height="2" fill="#8a8a92"/>
    <rect x="9"   y="19" width="5" height="2" fill="#8a8a92"/>
    <!-- Flame -->
    <polygon points="-4,11 4,11 2,22 0,28 -2,22" fill="#ff8c2a" opacity="0.85"/>
    <polygon points="-2,11 2,11 1,18 0,22 -1,18" fill="#ffee88" opacity="0.95"/>
  </g>
</svg>
